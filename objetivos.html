<!DOCTYPE html>
<html lang="es">
<head>

  <title>NutriRutina - Objetivos</title>

<body class="objectives-page">
  <div class="mesh-background" aria-hidden="true"></div>

  <main class="objectives-content" aria-labelledby="objectives-title">
    <section class="objectives-header fade-in-up">
      <h1 id="objectives-title">&iquest;Qu&eacute; quieres lograr hoy?</h1>
      <p>Selecciona tus objetivos principales para personalizar tu experiencia de nutrici&oacute;n y bienestar.</p>
    </section>

    <section class="objectives-grid fade-in-up" style="--delay: 140ms;" aria-label="Objetivos principales" data-objectives>
      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">restaurant</span>
        </span>
        <span class="objective-title">Comer m&aacute;s saludable</span>
        <span class="objective-copy">Enf&oacute;cate en ingredientes frescos y nutritivos.</span>
      </button>

      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">schedule</span>
        </span>
        <span class="objective-title">Ahorrar tiempo</span>
        <span class="objective-copy">Recetas r&aacute;pidas y planificaci&oacute;n eficiente.</span>
      </button>

      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">set_meal</span>
        </span>
        <span class="objective-title">Variar mis comidas</span>
        <span class="objective-copy">Descubre nuevos sabores cada semana.</span>
      </button>

      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </span>
        <span class="objective-title">Comer mejor por la noche</span>
        <span class="objective-copy">Cenas ligeras para un mejor descanso.</span>
      </button>

      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">shopping_cart</span>
        </span>
        <span class="objective-title">Organizar mis compras</span>
        <span class="objective-copy">Listas inteligentes para evitar desperdicios.</span>
      </button>

      <button class="objective-card" type="button">
        <span class="objective-icon">
          <span class="material-symbols-outlined" aria-hidden="true">verified</span>
        </span>
        <span class="objective-title">Mantener constancia</span>
        <span class="objective-copy">H&aacute;bitos sostenibles para el largo plazo.</span>
      </button>
    </section>

    <section class="objective-images" aria-label="Referencias visuales">

    <div class="continue-area">
      <button class="continue-button" type="button" data-next-screen="./dashboard.html">
        Continuar
        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
      </button>
    </div>
  </main>
  <script src="./scripts/prototype-shell.js"></script>
  <script src="./scripts/objetivos.js"></script>
